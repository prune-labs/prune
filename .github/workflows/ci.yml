name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.26.3'
        cache: true

    - name: Build
      run: go build -v -o prune ./cmd/prune

    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v7
      with:
        version: v2.12.2
        args: --timeout=5m

    - name: Test
      run: go test -v ./...
